<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="main-title">🌤 Async Weather Tracker</h1>

    <div class="wrapper">

        <!-- Left Card -->
        <div class="card">
            <h2>Search City</h2>

            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name">
                <button id="searchBtn">Search</button>
            </div>

            <h3>Search History</h3>
            <div id="history"></div>
        </div>

        <!-- Right Card -->
        <div class="card">
            <h2>Weather Info</h2>
            <div id="weatherResult"></div>
        </div>

    </div>

    <!-- Console Section -->
    <div class="console-card">
        <h2>Console – Event Loop</h2>
        <pre id="logBox"></pre>
    </div>

<script src="script.js"></script>
</body>
</html>
